<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tantauco VC — Diagrama de Flujo Operacional</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/mermaid/10.6.1/mermaid.min.js"></script>
<style>
  :root {
    --cream: #F2EDE3;
    --cream2: #EAE4D8;
    --dark: #1C3A2A;
    --dark2: #142D20;
    --green: #2D5A3D;
    --green2: #3B6D11;
    --gold: #C9A84C;
    --gold2: #B8972E;
    --text: #1C3A2A;
    --text2: #4A6355;
    --text3: #7A9585;
    --border: #D5CCBB;
    --border2: #C4BAA8;
    --white: #FFFFFF;
    --pipe-bg: #EAF3DE;
    --pipe-border: #3B6D11;
    --close-bg: #E1F5EE;
    --close-border: #0F6E56;
    --port-bg: #EEEDFE;
    --port-border: #534AB7;
    --decl-bg: #FAEEDA;
    --decl-border: #BA7517;
    --hold-bg: #F1EFE8;
    --hold-border: #888780;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; overflow: hidden; }

  body {
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    background: var(--cream);
    color: var(--text);
    display: flex;
    flex-direction: column;
  }

  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-thumb { background: var(--green); border-radius: 3px; }
  ::-webkit-scrollbar-track { background: var(--cream2); }

  /* HEADER */
  header {
    background: var(--dark);
    color: var(--cream);
    padding: 14px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    z-index: 100;
    border-bottom: 1px solid rgba(201,168,76,0.25);
  }
  .header-title {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: var(--cream);
    font-weight: 400;
  }
  .header-sub {
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-top: 2px;
    font-weight: 500;
  }
  .controls { display: flex; gap: 8px; align-items: center; }
  .btn {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(201,168,76,0.3);
    color: var(--cream);
    padding: 7px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.04em;
    transition: all 0.16s;
  }
  .btn:hover { background: rgba(201,168,76,0.18); border-color: var(--gold); }
  .btn.active { background: var(--gold); border-color: var(--gold); color: var(--dark); font-weight: 500; }
  .btn-icon { padding: 7px 11px; min-width: 36px; }
  .zoom-display {
    color: var(--cream);
    font-size: 11px;
    min-width: 48px;
    text-align: center;
    font-weight: 400;
    letter-spacing: 0.06em;
    opacity: 0.7;
  }
  .divider { width: 1px; height: 22px; background: rgba(201,168,76,0.3); margin: 0 4px; }

  /* MAIN */
  .main { display: flex; flex: 1; overflow: hidden; position: relative; }
  .diagram-area {
    flex: 1;
    overflow: hidden;
    position: relative;
    cursor: grab;
    background: var(--cream);
    background-image: radial-gradient(circle at 1px 1px, rgba(28,58,42,0.06) 1px, transparent 0);
    background-size: 24px 24px;
  }
  .diagram-area:active { cursor: grabbing; }
  .diagram-viewport {
    position: absolute;
    top: 0; left: 0;
    transform-origin: 0 0;
    padding: 60px;
  }
  .mermaid {
    background: transparent !important;
    font-family: 'DM Sans', sans-serif !important;
  }
  .mermaid .edgePath path { stroke-width: 1.6 !important; }
  .mermaid .edgeLabel {
    background: var(--cream) !important;
    color: var(--text2) !important;
    font-size: 11px !important;
    padding: 2px 6px !important;
    font-family: 'DM Sans', sans-serif !important;
  }
  .mermaid .nodeLabel {
    font-family: 'DM Sans', sans-serif !important;
    font-size: 12px !important;
  }

  /* HINT */
  .hint {
    position: absolute;
    top: 18px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--dark);
    color: var(--cream);
    font-size: 11px;
    padding: 8px 16px;
    border-radius: 24px;
    pointer-events: none;
    opacity: 1;
    transition: opacity 0.8s;
    box-shadow: 0 4px 14px rgba(28,58,42,0.18);
    letter-spacing: 0.04em;
    z-index: 50;
  }
  .hint .gold { color: var(--gold); margin: 0 6px; }

  /* LEGEND */
  .legend {
    position: absolute;
    bottom: 16px;
    left: 16px;
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    box-shadow: 0 2px 8px rgba(28,58,42,0.06);
    z-index: 50;
    max-width: 580px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 11px;
    color: var(--text2);
    font-weight: 400;
  }
  .legend-dot {
    width: 12px;
    height: 12px;
    border-radius: 3px;
    flex-shrink: 0;
    border: 1.5px solid;
  }

  /* SIDE PANEL */
  .side-panel {
    width: 0;
    background: var(--white);
    border-left: 1.5px solid var(--border);
    overflow: hidden;
    transition: width 0.3s ease;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    box-shadow: -4px 0 20px rgba(28,58,42,0.08);
  }
  .side-panel.open { width: 420px; }
  .panel-header {
    background: var(--dark);
    color: var(--cream);
    padding: 24px 26px 20px;
    flex-shrink: 0;
    position: relative;
  }
  .panel-close {
    position: absolute;
    top: 14px;
    right: 14px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: var(--cream);
    width: 28px;
    height: 28px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .panel-close:hover { background: rgba(201,168,76,0.25); border-color: var(--gold); }
  .panel-eyebrow {
    font-size: 10px;
    color: var(--gold);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 8px;
    font-weight: 500;
  }
  .panel-title {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: var(--cream);
    line-height: 1.25;
    font-weight: 400;
    margin-bottom: 10px;
  }
  .panel-sub {
    font-size: 12px;
    color: rgba(242,237,227,0.7);
    margin-bottom: 14px;
    font-weight: 300;
    line-height: 1.5;
  }
  .panel-meta { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 12px; }
  .resp-badge {
    background: rgba(201,168,76,0.18);
    border: 1px solid rgba(201,168,76,0.4);
    color: var(--gold);
    padding: 4px 11px;
    border-radius: 20px;
    font-size: 10.5px;
    letter-spacing: 0.04em;
    font-weight: 500;
  }
  .panel-body { flex: 1; overflow-y: auto; padding: 22px 26px 60px; }
  .panel-section { margin-bottom: 26px; }
  .panel-section h4 {
    font-size: 10px;
    color: var(--gold);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-weight: 500;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .panel-section p { font-size: 13px; color: var(--text); line-height: 1.65; font-weight: 300; }
  .nbox {
    background: var(--cream);
    border: 1px solid var(--border2);
    border-left: 3px solid var(--dark);
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 12px;
    color: var(--text2);
    line-height: 1.6;
    margin-bottom: 14px;
  }
  .nbox strong { color: var(--text); font-weight: 500; }
  .item-list { list-style: none; padding: 0; }
  .item-list li {
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 10px 13px;
    margin-bottom: 7px;
    font-size: 12.5px;
    color: var(--text);
    line-height: 1.55;
    display: flex;
    gap: 10px;
    align-items: flex-start;
    font-weight: 300;
  }
  .item-list li::before {
    content: "";
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green);
    flex-shrink: 0;
    margin-top: 7px;
  }
  .event-list { list-style: none; padding: 0; }
  .event-list li {
    font-size: 12px;
    color: var(--text2);
    padding: 6px 0 6px 18px;
    position: relative;
    line-height: 1.5;
    font-weight: 300;
    border-bottom: 1px solid rgba(213,204,187,0.5);
  }
  .event-list li:last-child { border-bottom: none; }
  .event-list li::before {
    content: "›";
    position: absolute;
    left: 4px;
    color: var(--gold);
    font-weight: 600;
  }
  .tools-row { display: flex; flex-wrap: wrap; gap: 6px; }
  .tool-pill {
    background: var(--cream2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 5px 11px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 400;
  }
  .auto-list { list-style: none; padding: 0; }
  .auto-list li {
    background: rgba(201,168,76,0.06);
    border: 1px solid rgba(201,168,76,0.25);
    border-left: 3px solid var(--gold);
    border-radius: 8px;
    padding: 10px 13px;
    margin-bottom: 7px;
    font-size: 12px;
    color: var(--text);
    line-height: 1.55;
    font-weight: 300;
  }
  .sub-section { margin-top: 14px; }
  .sub-section-title {
    font-family: 'Playfair Display', serif;
    font-size: 14px;
    color: var(--text);
    margin-bottom: 6px;
    font-weight: 600;
  }
  .sub-section-desc { font-size: 12px; color: var(--text2); line-height: 1.55; font-weight: 300; margin-bottom: 10px; }

  .mermaid .node.has-info { cursor: pointer; }
  .mermaid .node.has-info:hover {
    filter: brightness(1.05) drop-shadow(0 0 6px rgba(201,168,76,0.5));
  }

  @media (max-width: 768px) {
    .side-panel.open { width: 100vw; position: absolute; right: 0; top: 0; bottom: 0; z-index: 200; }
    .legend { max-width: calc(100vw - 32px); font-size: 10px; }
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="header-title">Tantauco Ventures</div>
    <div class="header-sub">Diagrama de Flujo Operacional</div>
  </div>
  <div class="controls">
    <button class="btn active" id="viewToggle" onclick="toggleView()">Vista Detallada</button>
    <div class="divider"></div>
    <button class="btn btn-icon" onclick="zoomOut()">−</button>
    <span class="zoom-display" id="zoomDisplay">70%</span>
    <button class="btn btn-icon" onclick="zoomIn()">+</button>
    <button class="btn" onclick="resetView()">Reset</button>
    <button class="btn" onclick="fitView()">Fit</button>
  </div>
</header>

<div class="main">
  <div class="diagram-area" id="diagramArea">
    <div class="diagram-viewport" id="viewport">
      <div class="mermaid" id="mermaidDiv"></div>
    </div>

    <div class="hint" id="hint">
      <span class="gold">↔</span> Arrastra para moverte
      <span class="gold">·</span> Scroll para zoom
      <span class="gold">·</span> Click en nodos para ver detalle
    </div>

    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#EAF3DE;border-color:#3B6D11"></div> Pipeline</div>
      <div class="legend-item"><div class="legend-dot" style="background:#E1F5EE;border-color:#0F6E56"></div> Cierre / DD</div>
      <div class="legend-item"><div class="legend-dot" style="background:#EEEDFE;border-color:#534AB7"></div> Portfolio</div>
      <div class="legend-item"><div class="legend-dot" style="background:#FAEEDA;border-color:#BA7517"></div> Declined</div>
      <div class="legend-item"><div class="legend-dot" style="background:#F1EFE8;border-color:#888780"></div> Hold</div>
      <div class="legend-item"><div class="legend-dot" style="background:#FFFFFF;border-color:#C4BAA8"></div> Acción</div>
    </div>
  </div>

  <div class="side-panel" id="sidePanel">
    <div class="panel-header" id="panelHeader"></div>
    <div class="panel-body" id="panelBody"></div>
  </div>
</div>

IC -. Mal timing .-> HOLD["HOLD<br/>Revisión cada 2 meses"]:::hold

EVAL["EVALUACIÓN<br/>2da reunión + referencias"]:::pipe
EVAL --> MEMO
EVAL -. Decline .-> DECLINED
EVAL -. Hold .-> HOLD

MEMO["INVESTMENT MEMO<br/>Redacción en Notion"]:::close
MEMO --> EC

EC["EXTERNAL COMMITTEE<br/>Decisión final"]:::close
EC --> DD
EC -. Rechazado .-> DECLINED

DD["DUE DILIGENCE LEGAL<br/>Term sheet + DD"]:::close
DD --> INVESTED
DD -. Red flags .-> DECLINED

INVESTED["INVESTED<br/>Cierre + portfolio"]:::close
INVESTED --> SEC1

SEC1(["PORTFOLIO MONITORING"]):::section
SEC1 --> ONB

ONB["ONBOARDING<br/>Bienvenida + categorización"]:::port
ONB --> REC
ONB --> SUP

REC["REUNIONES RECURRENTES<br/>Mensual + Quarterly form"]:::port
SUP["SOPORTE ACTIVO<br/>5 tracks de valor"]:::port`;

  function renderPanel(key) {
    let dataKey = key;
    if (key.startsWith('DECLINED')) dataKey = 'DECLINED';
    if (key.startsWith('HOLD')) dataKey = 'HOLD';
    const d = panelData[dataKey];
    if (!d) return;

    const header = document.getElementById('panelHeader');
    const body = document.getElementById('panelBody');

    header.innerHTML = `
      <button class="panel-close" onclick="closePanel()">✕</button>
      <div class="panel-eyebrow">${d.eyebrow}</div>
      <div class="panel-title">${d.title}</div>
      <div class="panel-sub">${d.sub || ''}</div>
      <div class="panel-meta">
        ${d.responsables.map(r => `<span class="resp-badge">${r}</span>`).join('')}
      </div>
    `;

    let html = '';
    if (d.description) html += `<div class="panel-section"><h4>Descripción</h4><p>${d.description}</p></div>`;
    if (d.note) html += `<div class="panel-section"><div class="nbox">${d.note}</div></div>`;
    if (d.storage) html += `<div class="panel-section"><h4>Storage</h4><p style="font-family:monospace;font-size:12px">${d.storage}</p></div>`;
    if (d.info && d.info.length) html += `<div class="panel-section"><h4>Información requerida</h4><ul class="item-list">${d.info.map(i => `<li>${i}</li>`).join('')}</ul></div>`;
    if (d.tasks && d.tasks.length) html += `<div class="panel-section"><h4>Tareas</h4><ul class="item-list">${d.tasks.map(t => `<li>${t}</li>`).join('')}</ul></div>`;
    if (d.events && d.events.length) html += `<div class="panel-section"><h4>Eventos registrables</h4><ul class="event-list">${d.events.map(e => `<li>${e}</li>`).join('')}</ul></div>`;
    if (d.tools && d.tools.length) html += `<div class="panel-section"><h4>Herramientas</h4><div class="tools-row">${d.tools.map(t => `<span class="tool-pill">${t}</span>`).join('')}</div></div>`;
    if (d.subs && d.subs.length) {
      html += `<div class="panel-section"><h4>Sub-secciones</h4>`;
      d.subs.forEach(s => {
        html += `<div class="sub-section"><div class="sub-section-title">${s.t}</div><div class="sub-section-desc">${s.d}</div></div>`;
      });
      html += `</div>`;
    }
    if (d.automations && d.automations.length) html += `<div class="panel-section"><h4>Automatizaciones IA pendientes</h4><ul class="auto-list">${d.automations.map(a => `<li>${a}</li>`).join('')}</ul></div>`;

    body.innerHTML = html;
    document.getElementById('sidePanel').classList.add('open');
  }

  function closePanel() {
    document.getElementById('sidePanel').classList.remove('open');
  }

  mermaid.initialize({
    startOnLoad: false,
    theme: 'base',
    securityLevel: 'loose',
    themeVariables: {
      primaryColor: '#FFFFFF',
      primaryTextColor: '#1C3A2A',
      primaryBorderColor: '#C4BAA8',
      lineColor: '#7A9585',
      mainBkg: '#FFFFFF',
      nodeBorder: '#C4BAA8',
      clusterBkg: '#F2EDE3',
      titleColor: '#1C3A2A',
      edgeLabelBackground: '#F2EDE3',
      fontFamily: 'DM Sans, sans-serif',
      fontSize: '12px'
    },
    flowchart: {
      curve: 'basis',
      padding: 24,
      nodeSpacing: 50,
      rankSpacing: 60,
      htmlLabels: true,
      useMaxWidth: false
    }
  });

  let currentView = 'detailed';

  async function renderDiagram() {
    const div = document.getElementById('mermaidDiv');
    const code = currentView === 'detailed' ? detailedDiagram : compactDiagram;
    div.innerHTML = code;
    div.removeAttribute('data-processed');
    try {
      await mermaid.run({ nodes: [div] });
      attachClickHandlers();
    } catch (e) {
      console.error('Mermaid error:', e);
    }
  }

  function attachClickHandlers() {
    const svg = document.querySelector('.mermaid svg');
    if (!svg) return;
    const interactive = ['SCOUTING','SCREENING','IC','EVAL','MEMO','EC','DD','INVESTED','ONB','REC','SUP','DECLINED','DECLINED1','DECLINED2','DECLINED3','DECLINED4','DECLINED5','DECLINED6','HOLD','HOLD1','HOLD2'];

    svg.querySelectorAll('.node').forEach(node => {
      const idMatch = node.id?.match(/flowchart-([A-Z0-9]+)-/);
      if (!idMatch) return;
      const nodeKey = idMatch[1];
      if (interactive.includes(nodeKey)) {
        node.classList.add('has-info');
        node.style.cursor = 'pointer';
        node.addEventListener('click', (e) => {
          e.stopPropagation();
          renderPanel(nodeKey);
        });
      }
    });
  }

  let scale = 0.7;
  let translateX = 40;
  let translateY = 40;
  let isDragging = false;
  let startX, startY, startTX, startTY;

  const viewport = document.getElementById('viewport');
  const diagramArea = document.getElementById('diagramArea');
  const zoomDisplay = document.getElementById('zoomDisplay');

  function applyTransform() {
    viewport.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
    zoomDisplay.textContent = Math.round(scale * 100) + '%';
  }

  function zoomIn() { scale = Math.min(scale * 1.25, 10); applyTransform(); }
  function zoomOut() { scale = Math.max(scale / 1.25, 0.05); applyTransform(); }
  function resetView() { scale = 0.7; translateX = 40; translateY = 40; applyTransform(); }
  function fitView() {
    const area = diagramArea.getBoundingClientRect();
    const svg = document.querySelector('.mermaid svg');
    if (!svg) return;
    const bbox = svg.getBBox();
    const newScale = Math.min(area.width / (bbox.width + 120), area.height / (bbox.height + 120), 1);
    scale = newScale;
    translateX = (area.width - bbox.width * newScale) / 2;
    translateY = 30;
    applyTransform();
  }

  function toggleView() {
    currentView = currentView === 'detailed' ? 'compact' : 'detailed';
    const btn = document.getElementById('viewToggle');
    btn.textContent = currentView === 'detailed' ? 'Vista Detallada' : 'Vista Compacta';
    closePanel();
    renderDiagram().then(() => { setTimeout(fitView, 300); });
  }

  diagramArea.addEventListener('wheel', (e) => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? 0.9 : 1.1;
    const rect = diagramArea.getBoundingClientRect();
    const mouseX = e.clientX - rect.left;
    const mouseY = e.clientY - rect.top;
    const newScale = Math.max(0.05, Math.min(10, scale * delta));
    translateX = mouseX - (mouseX - translateX) * (newScale / scale);
    translateY = mouseY - (mouseY - translateY) * (newScale / scale);
    scale = newScale;
    applyTransform();
  }, { passive: false });

  diagramArea.addEventListener('mousedown', (e) => {
    if (e.target.closest('.side-panel')) return;
    if (e.target.closest('.node.has-info')) return;
    isDragging = true;
    startX = e.clientX;
    startY = e.clientY;
    startTX = translateX;
    startTY = translateY;
    e.preventDefault();
  });

  document.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    translateX = startTX + (e.clientX - startX);
    translateY = startTY + (e.clientY - startY);
    applyTransform();
  });

  document.addEventListener('mouseup', () => { isDragging = false; });

  window.zoomIn = zoomIn;
  window.zoomOut = zoomOut;
  window.resetView = resetView;
  window.fitView = fitView;
  window.toggleView = toggleView;
  window.closePanel = closePanel;

  renderDiagram().then(() => {
    applyTransform();
    setTimeout(() => {
      const hint = document.getElementById('hint');
      if (hint) hint.style.opacity = '0';
    }, 5000);
  });
</script>
</body>
</html>
