<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tantauco VC — Diagrama de Flujo Operacional</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/mermaid/10.6.1/mermaid.min.js"></script>
<style>
  :root {
    --cream:#F2EDE3; --cream2:#EAE4D8; --dark:#1C3A2A; --green:#2D5A3D; --green2:#3B6D11;
    --gold:#C9A84C; --text:#1C3A2A; --text2:#4A6355; --text3:#7A9585;
    --border:#D5CCBB; --border2:#C4BAA8; --white:#FFFFFF;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;overflow:hidden;}
  body{font-family:'DM Sans',sans-serif;font-weight:300;background:var(--cream);color:var(--text);display:flex;flex-direction:column;}
  ::-webkit-scrollbar{width:5px;height:5px;}
  ::-webkit-scrollbar-thumb{background:var(--green);border-radius:3px;}
  ::-webkit-scrollbar-track{background:var(--cream2);}

  header{background:var(--dark);color:var(--cream);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:100;border-bottom:1px solid rgba(201,168,76,0.25);}
  .header-title{font-family:'Playfair Display',serif;font-size:22px;color:var(--cream);font-weight:400;}
  .header-sub{font-size:11px;color:var(--gold);letter-spacing:0.18em;text-transform:uppercase;margin-top:2px;font-weight:500;}
  .controls{display:flex;gap:8px;align-items:center;}
  .btn{background:rgba(255,255,255,0.06);border:1px solid rgba(201,168,76,0.3);color:var(--cream);padding:7px 14px;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:400;transition:all 0.16s;}
  .btn:hover{background:rgba(201,168,76,0.18);border-color:var(--gold);}
  .btn.active{background:var(--gold);border-color:var(--gold);color:var(--dark);font-weight:500;}
  .btn-icon{padding:7px 11px;min-width:36px;}
  .zoom-display{color:var(--cream);font-size:11px;min-width:48px;text-align:center;opacity:0.7;}
  .divider{width:1px;height:22px;background:rgba(201,168,76,0.3);margin:0 4px;}

  .main{display:flex;flex:1;overflow:hidden;}
  .diagram-area{flex:1;overflow:hidden;position:relative;cursor:grab;background:var(--cream);background-image:radial-gradient(circle at 1px 1px,rgba(28,58,42,0.06) 1px,transparent 0);background-size:24px 24px;}
  .diagram-area:active{cursor:grabbing;}
  .diagram-viewport{position:absolute;top:0;left:0;transform-origin:0 0;padding:60px;}
  .mermaid{background:transparent !important;}
  .mermaid svg text{font-family:'DM Sans',sans-serif !important;fill:inherit !important;}
  .mermaid .edgeLabel text{font-size:11px !important;fill:var(--text2) !important;}
  .mermaid .edgeLabel rect{fill:var(--cream) !important;}
  .mermaid .edgePath path{stroke-width:1.6px !important;}
  .mermaid .node.clickable{cursor:pointer !important;}
  .mermaid .node.clickable:hover rect,.mermaid .node.clickable:hover polygon{filter:brightness(0.94);stroke-width:3px !important;}

  .hint{position:absolute;top:18px;left:50%;transform:translateX(-50%);background:var(--dark);color:var(--cream);font-size:11px;padding:8px 16px;border-radius:24px;pointer-events:none;opacity:1;transition:opacity 0.8s;box-shadow:0 4px 14px rgba(28,58,42,0.18);z-index:50;white-space:nowrap;}
  .hint .gold{color:var(--gold);margin:0 6px;}

  .legend{position:absolute;bottom:16px;left:16px;background:var(--white);border:1.5px solid var(--border);border-radius:12px;padding:12px 16px;display:flex;gap:14px;flex-wrap:wrap;box-shadow:0 2px 8px rgba(28,58,42,0.06);z-index:50;}
  .legend-item{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--text2);}
  .legend-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0;border:1.5px solid;}

  .side-panel{width:0;background:var(--white);border-left:1.5px solid var(--border);overflow:hidden;transition:width 0.3s ease;flex-shrink:0;display:flex;flex-direction:column;box-shadow:-4px 0 20px rgba(28,58,42,0.08);}
  .side-panel.open{width:50vw;}
  .panel-header{background:var(--dark);color:var(--cream);padding:24px 36px 20px;flex-shrink:0;position:relative;}
  .panel-close{position:absolute;top:14px;right:20px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:var(--cream);width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
  .panel-close:hover{background:rgba(201,168,76,0.25);border-color:var(--gold);}
  .panel-eyebrow{font-size:10px;color:var(--gold);letter-spacing:0.18em;text-transform:uppercase;margin-bottom:8px;font-weight:500;}
  .panel-title{font-family:'Playfair Display',serif;font-size:22px;color:var(--cream);line-height:1.25;font-weight:400;margin-bottom:10px;}
  .panel-sub{font-size:12px;color:rgba(242,237,227,0.7);margin-bottom:14px;font-weight:300;line-height:1.5;}
  .panel-meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px;}
  .resp-badge{background:rgba(201,168,76,0.18);border:1px solid rgba(201,168,76,0.4);color:var(--gold);padding:4px 11px;border-radius:20px;font-size:10.5px;letter-spacing:0.04em;font-weight:500;}
  .panel-body{flex:1;overflow-y:auto;padding:26px 36px 60px;}
  .panel-section{margin-bottom:26px;}
  .panel-section h4{font-size:10px;color:var(--gold);letter-spacing:0.18em;text-transform:uppercase;font-weight:500;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}
  .panel-section p{font-size:13px;color:var(--text);line-height:1.65;font-weight:300;}
  .nbox{background:var(--cream);border:1px solid var(--border2);border-left:3px solid var(--dark);border-radius:8px;padding:12px 14px;font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:14px;}
  .nbox strong{color:var(--text);font-weight:500;}
  .item-list{list-style:none;padding:0;display:grid;grid-template-columns:1fr 1fr;gap:7px;}
  .item-list li{background:var(--cream);border:1px solid var(--border);border-radius:9px;padding:10px 13px;font-size:12.5px;color:var(--text);line-height:1.55;display:flex;gap:10px;align-items:flex-start;font-weight:300;}
  .item-list li::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0;margin-top:7px;}
  .event-list{list-style:none;padding:0;}
  .event-list li{font-size:12px;color:var(--text2);padding:6px 0 6px 18px;position:relative;line-height:1.5;font-weight:300;border-bottom:1px solid rgba(213,204,187,0.5);}
  .event-list li:last-child{border-bottom:none;}
  .event-list li::before{content:"›";position:absolute;left:4px;color:var(--gold);font-weight:600;}
  .tools-row{display:flex;flex-wrap:wrap;gap:6px;}
  .tool-pill{background:var(--cream2);border:1px solid var(--border);color:var(--text);padding:5px 11px;border-radius:20px;font-size:11px;}
  .auto-list{list-style:none;padding:0;}
  .auto-list li{background:rgba(201,168,76,0.06);border:1px solid rgba(201,168,76,0.25);border-left:3px solid var(--gold);border-radius:8px;padding:10px 13px;margin-bottom:7px;font-size:12px;color:var(--text);line-height:1.55;font-weight:300;}
  .sub-section{margin-top:14px;}
  .sub-section-title{font-family:'Playfair Display',serif;font-size:14px;color:var(--text);margin-bottom:6px;font-weight:600;}
  .sub-section-desc{font-size:12px;color:var(--text2);line-height:1.55;font-weight:300;margin-bottom:10px;}
  .vote-box{background:rgba(201,168,76,0.08);border:1.5px solid rgba(201,168,76,0.35);border-radius:10px;padding:14px 16px;margin-bottom:14px;}
  .vote-box h5{font-size:11px;color:var(--gold);letter-spacing:0.12em;text-transform:uppercase;font-weight:500;margin-bottom:8px;}
  .vote-box p{font-size:12px;color:var(--text);line-height:1.6;font-weight:300;}
  .vote-box .rule{margin-top:8px;font-size:12px;color:var(--text2);font-weight:400;white-space:pre-line;}
  .vote-box .rule strong{color:var(--dark);font-weight:500;}
</style>
</head>
<body>

<header>
  <div>
    <div class="header-title">Tantauco Ventures</div>
    <div class="header-sub">Diagrama de Flujo Operacional</div>
  </div>
  <div class="controls">
    <button class="btn active" id="viewToggle" onclick="toggleView()">Vista Detallada</button>
    <div class="divider"></div>
    <button class="btn btn-icon" onclick="zoomOut()">−</button>
    <span class="zoom-display" id="zoomDisplay">60%</span>
    <button class="btn btn-icon" onclick="zoomIn()">+</button>
    <button class="btn" onclick="resetView()">Reset</button>
    <button class="btn" onclick="fitView()">Fit</button>
  </div>
</header>

<div class="main">
  <div class="diagram-area" id="diagramArea">
    <div class="diagram-viewport" id="viewport">
      <div class="mermaid" id="mermaidDiv"></div>
    </div>
    <div class="hint" id="hint">
      <span class="gold">↔</span> Arrastra para moverte
      <span class="gold">·</span> Scroll para zoom
      <span class="gold">·</span> Click en nodos para ver detalle
    </div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#D4EDDA;border-color:#1C6B32"></div> Etapa principal</div>
      <div class="legend-item"><div class="legend-dot" style="background:#EAF3DE;border-color:#3B6D11"></div> Pipeline</div>
      <div class="legend-item"><div class="legend-dot" style="background:#E1F5EE;border-color:#0F6E56"></div> Cierre / DD</div>
      <div class="legend-item"><div class="legend-dot" style="background:#EEEDFE;border-color:#534AB7"></div> Portfolio</div>
      <div class="legend-item"><div class="legend-dot" style="background:#FAEEDA;border-color:#BA7517"></div> Declined</div>
      <div class="legend-item"><div class="legend-dot" style="background:#F1EFE8;border-color:#888780"></div> Hold</div>
      <div class="legend-item"><div class="legend-dot" style="background:#FFF8E7;border-color:#C9A84C"></div> Memo</div>
      <div class="legend-item"><div class="legend-dot" style="background:#FFFFFF;border-color:#C4BAA8"></div> Accion</div>
    </div>
  </div>

  <div class="side-panel" id="sidePanel">
    <div class="panel-header" id="panelHeader"></div>
    <div class="panel-body" id="panelBody"></div>
  </div>
</div>

SEC1 --> ONB

ONB["          🤝  ONBOARDING          \nBienvenida · Perks · Quarterly form\nWhatsApp · Cap table"]:::portstage
ONB --> REC
ONB --> SUP

REC["          📅  REUNIONES RECURRENTES          \nSeguimiento mensual continuo\nGranola · Quarterly form trimestral"]:::portstage
SUP["          🚀  SOPORTE ACTIVO          \n5 tracks de valor proactivos\nEstrategia · Intros · Perks · Comunidad"]:::portstage`;

  // ── PANEL RENDER ──────────────────────────────────────
  function renderPanel(key) {
    let dataKey = key;
    if (key.startsWith('DECLINED')) dataKey = 'DECLINED';
    if (key.startsWith('HOLD')) dataKey = 'HOLD';
    const d = panelData[dataKey];
    if (!d) return;

    document.getElementById('panelHeader').innerHTML = `
      <button class="panel-close" onclick="closePanel()">✕</button>
      <div class="panel-eyebrow">${d.eyebrow}</div>
      <div class="panel-title">${d.title}</div>
      <div class="panel-sub">${d.sub||''}</div>
      <div class="panel-meta">${d.responsables.map(r=>`<span class="resp-badge">${r}</span>`).join('')}</div>
    `;

    let html = '';
    if (d.description) html += `<div class="panel-section"><h4>Descripcion</h4><p>${d.description}</p></div>`;
    if (d.note) html += `<div class="panel-section"><div class="nbox">${d.note}</div></div>`;
    if (d.voto) {
      html += `<div class="panel-section"><h4>Votacion Fibonacci</h4>
        <div class="vote-box">
          <h5>${d.voto.titulo}</h5>
          <p><strong>Participantes:</strong> ${d.voto.participantes}</p>
          <p style="margin-top:6px"><strong>Escala:</strong> ${d.voto.escala}</p>
          <div class="rule" style="margin-top:10px"><strong>Regla de aprobacion:</strong><br>${d.voto.regla}</div>
          <p style="margin-top:8px;font-size:11px;color:var(--text3)">${d.voto.extra}</p>
        </div></div>`;
    }
    if (d.storage) html += `<div class="panel-section"><h4>Storage</h4><p style="font-family:monospace;font-size:12px">${d.storage}</p></div>`;
    if (d.info?.length) html += `<div class="panel-section"><h4>Informacion requerida</h4><ul class="item-list">${d.info.map(i=>`<li>${i}</li>`).join('')}</ul></div>`;
    if (d.tasks?.length) html += `<div class="panel-section"><h4>Tareas</h4><ul class="item-list">${d.tasks.map(t=>`<li>${t}</li>`).join('')}</ul></div>`;
    if (d.events?.length) html += `<div class="panel-section"><h4>Eventos registrables</h4><ul class="event-list">${d.events.map(e=>`<li>${e}</li>`).join('')}</ul></div>`;
    if (d.tools?.length) html += `<div class="panel-section"><h4>Herramientas</h4><div class="tools-row">${d.tools.map(t=>`<span class="tool-pill">${t}</span>`).join('')}</div></div>`;
    if (d.subs?.length) {
      html += `<div class="panel-section"><h4>Detalle</h4>`;
      d.subs.forEach(s => { html += `<div class="sub-section"><div class="sub-section-title">${s.t}</div><div class="sub-section-desc">${s.d}</div></div>`; });
      html += `</div>`;
    }
    if (d.automations?.length) html += `<div class="panel-section"><h4>Automatizaciones IA pendientes</h4><ul class="auto-list">${d.automations.map(a=>`<li>${a}</li>`).join('')}</ul></div>`;

    document.getElementById('panelBody').innerHTML = html;
    document.getElementById('sidePanel').classList.add('open');
  }

  function closePanel() { document.getElementById('sidePanel').classList.remove('open'); }

  // ── MERMAID ───────────────────────────────────────────
  mermaid.initialize({
    startOnLoad:false, theme:'base', securityLevel:'loose',
    flowchart:{curve:'basis',padding:28,nodeSpacing:60,rankSpacing:80,htmlLabels:false,useMaxWidth:false}
  });

  let currentView = 'detailed';
  const interactiveNodes = ['SCOUTING','SCREENING','PRECOMITE','COMITEI','MEMO','MEMO_FIN','EC','DD','INVESTED',
    'ONB','REC','SUP','DECLINED','DECLINED1','DECLINED2','DECLINED3','DECLINED4','DECLINED5','DECLINED6','DECLINED7',
    'HOLD','HOLD1','HOLD2'];

  async function renderDiagram() {
    const div = document.getElementById('mermaidDiv');
    div.innerHTML = currentView==='detailed' ? detailedDiagram : compactDiagram;
    div.removeAttribute('data-processed');
    try {
      await mermaid.run({nodes:[div]});
      attachClickHandlers();
    } catch(e) { console.error('Mermaid error:',e); }
  }

  function attachClickHandlers() {
    const svg = document.querySelector('.mermaid svg');
    if (!svg) return;
    svg.querySelectorAll('.node').forEach(node => {
      const m = node.id?.match(/flowchart-([A-Z0-9_]+)-/);
      if (!m) return;
      const key = m[1];
      if (interactiveNodes.includes(key)) {
        node.classList.add('clickable');
        node.style.cursor = 'pointer';
        node.addEventListener('click', e => { e.stopPropagation(); renderPanel(key); });
      }
    });
  }

  // ── ZOOM & PAN ────────────────────────────────────────
  let scale=0.6, translateX=40, translateY=40;
  let isDragging=false, startX, startY, startTX, startTY;
  const viewport = document.getElementById('viewport');
  const diagramArea = document.getElementById('diagramArea');
  const zoomDisplay = document.getElementById('zoomDisplay');

  function applyTransform(){viewport.style.transform=`translate(${translateX}px,${translateY}px) scale(${scale})`;zoomDisplay.textContent=Math.round(scale*100)+'%';}
  function zoomIn(){scale=Math.min(scale*1.25,10);applyTransform();}
  function zoomOut(){scale=Math.max(scale/1.25,0.05);applyTransform();}
  function resetView(){scale=0.6;translateX=40;translateY=40;applyTransform();}
  function fitView(){
    const area=diagramArea.getBoundingClientRect();
    const svg=document.querySelector('.mermaid svg');
    if(!svg)return;
    const bb=svg.getBoundingClientRect();
    const nw=bb.width/scale,nh=bb.height/scale;
    const ns=Math.min((area.width-80)/nw,(area.height-80)/nh,1);
    scale=ns;translateX=(area.width-nw*ns)/2;translateY=30;applyTransform();
  }
  function toggleView(){
    currentView=currentView==='detailed'?'compact':'detailed';
    document.getElementById('viewToggle').textContent=currentView==='detailed'?'Vista Detallada':'Vista Compacta';
    closePanel();
    renderDiagram().then(()=>setTimeout(fitView,400));
  }

  diagramArea.addEventListener('wheel',e=>{
    e.preventDefault();
    const delta=e.deltaY>0?0.9:1.1;
    const rect=diagramArea.getBoundingClientRect();
    const mx=e.clientX-rect.left,my=e.clientY-rect.top;
    const ns=Math.max(0.05,Math.min(10,scale*delta));
    translateX=mx-(mx-translateX)*(ns/scale);translateY=my-(my-translateY)*(ns/scale);
    scale=ns;applyTransform();
  },{passive:false});

  diagramArea.addEventListener('mousedown',e=>{
    if(e.target.closest('.side-panel')||e.target.closest('.clickable'))return;
    isDragging=true;startX=e.clientX;startY=e.clientY;startTX=translateX;startTY=translateY;
    e.preventDefault();
  });
  document.addEventListener('mousemove',e=>{if(!isDragging)return;translateX=startTX+(e.clientX-startX);translateY=startTY+(e.clientY-startY);applyTransform();});
  document.addEventListener('mouseup',()=>{isDragging=false;});

  window.zoomIn=zoomIn;window.zoomOut=zoomOut;window.resetView=resetView;
  window.fitView=fitView;window.toggleView=toggleView;window.closePanel=closePanel;

  renderDiagram().then(()=>{
    applyTransform();
    setTimeout(()=>{const h=document.getElementById('hint');if(h)h.style.opacity='0';},5000);
  });
</script>
</body>
</html>
